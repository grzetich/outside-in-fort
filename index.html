<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Outside-In Safety — Animated Explainer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Sans+Condensed:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a1626;
    --panel:#0f2036;
    --line:#1e3553;
    --line-soft:#172a42;
    --text:#eaf1f8;
    --muted:#90a6bd;
    --faint:#5d7591;
    --blue:#2f8fe0;
    --blue-deep:#16466f;
    --orange:#ff6a2c;
    --orange-deep:#7a3413;
    --white:#ffffff;
    --mono:'IBM Plex Mono',ui-monospace,monospace;
    --sans:'IBM Plex Sans',system-ui,sans-serif;
    --cond:'IBM Plex Sans Condensed','IBM Plex Sans',sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--bg)}
  body{
    color:var(--text);font-family:var(--sans);
    background:radial-gradient(1100px 600px at 80% -10%,rgba(255,106,44,.06),transparent 60%),linear-gradient(180deg,#0a1626,#081120);
    -webkit-font-smoothing:antialiased;
    display:flex;flex-direction:column;align-items:center;gap:16px;padding:26px 18px 50px;
  }
  .meta{max-width:860px;width:100%;display:flex;justify-content:space-between;align-items:baseline;gap:16px;border-bottom:1px solid var(--line);padding-bottom:12px}
  .meta .t{font-family:var(--cond);font-weight:700;font-size:22px;letter-spacing:-.01em}
  .meta .t small{display:block;font-family:var(--mono);font-size:10px;letter-spacing:.16em;color:var(--orange);text-transform:uppercase;font-weight:500;margin-bottom:3px}
  .meta .hint{font-size:11.5px;color:var(--faint);text-align:right;max-width:280px;line-height:1.5}

  /* STAGE = the recordable frame */
  .stage{
    width:100%;max-width:860px;background:var(--panel);border:1px solid var(--line);border-radius:12px;overflow:hidden;
    box-shadow:0 24px 60px -30px rgba(0,0,0,.7);
  }
  .scene{display:block;width:100%;height:auto;background:linear-gradient(180deg,#0b1a2e,#081320)}

  /* controls (outside the frame, not recorded) */
  .ctrls{width:100%;max-width:860px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .btn{background:var(--orange);color:#0a1626;border:0;border-radius:7px;font-family:var(--cond);font-weight:700;font-size:14px;padding:9px 18px;cursor:pointer;transition:.15s}
  .btn:hover{filter:brightness(1.08)}
  .btn.ghost{background:transparent;color:var(--muted);border:1px solid var(--line)}
  .btn.ghost:hover{color:var(--text);border-color:#2d4a6b}
  .dots{display:flex;gap:8px;margin-left:auto}
  .dot{width:11px;height:11px;border-radius:50%;background:#22384f;border:0;cursor:pointer;padding:0;transition:.15s}
  .dot.on{background:var(--orange)}

  /* ---- scene element states, driven by data-beat ---- */
  .zoneFill{fill:rgba(47,143,224,.05);stroke:var(--blue-deep);stroke-width:2;transition:.6s}
  .robotSensors{opacity:0;transition:.5s}
  .extLayer{opacity:0;transition:.5s}
  .extLayer .node{transform-box:fill-box;transform-origin:center}
  .person{opacity:0;transition:transform 1.4s cubic-bezier(.4,0,.2,1),opacity .5s;transform:translate(340px,20px)}
  .statusTxt tspan{transition:.4s}
  .robotBody{transition:fill .5s,stroke .5s}
  .breach{opacity:0;transition:.5s}

  /* beat 1: scene set */
  .stage[data-beat="1"] .robotG{animation:patrol 6s ease-in-out infinite alternate}

  /* beat 2: robot's own sensors */
  .stage[data-beat="2"] .robotG{animation:patrol 6s ease-in-out infinite alternate}
  .stage[data-beat="2"] .robotSensors{opacity:1}

  /* beat 3: outside-in layer appears */
  .stage[data-beat="3"] .robotG{animation:patrol 6s ease-in-out infinite alternate}
  .stage[data-beat="3"] .extLayer{opacity:1}
  .stage[data-beat="3"] .extLayer .node{animation:nodepulse 2.2s ease-in-out infinite}
  .stage[data-beat="3"] .zoneFill{stroke:var(--orange-deep)}

  /* beat 4: intrusion + safe stop */
  .stage[data-beat="4"] .extLayer{opacity:1}
  .stage[data-beat="4"] .extLayer .node{animation:nodepulse 1.1s ease-in-out infinite}
  .stage[data-beat="4"] .robotG{transform:translateX(0)}
  .stage[data-beat="4"] .robotSensors{opacity:.5}
  .stage[data-beat="4"] .person{opacity:1;transform:translate(340px,150px)}
  .stage[data-beat="4"] .breach{opacity:1}
  .stage[data-beat="4"] .zoneFill{fill:rgba(255,106,44,.07);stroke:var(--orange)}
  .stage[data-beat="4"] .robotBody{fill:#3a1c0c;stroke:var(--orange)}

  @keyframes patrol{from{transform:translateX(-150px)}to{transform:translateX(150px)}}
  @keyframes nodepulse{0%,100%{opacity:.55}50%{opacity:1}}
  @keyframes sweep{0%,100%{opacity:.8}50%{opacity:1}}
  .stage .robotSensors .arc{animation:sweep 3s ease-in-out infinite}
</style>
</head>
<body>

  <div class="meta">
    <div class="t"><small>FORT · Operator Orientation</small>Outside-In Safety</div>
  </div>

  <div class="stage" id="stage" data-beat="1">
    <svg class="scene" viewBox="0 0 860 470" xmlns="http://www.w3.org/2000/svg" aria-label="Top-down view of a robot operating zone">
      <defs>
        <pattern id="floor" width="40" height="40" patternUnits="userSpaceOnUse">
          <path d="M40 0H0V40" fill="none" stroke="#122944" stroke-width="1"/>
        </pattern>
        <linearGradient id="coneGrad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="var(--blue)" stop-opacity=".65"/>
          <stop offset="100%" stop-color="var(--blue)" stop-opacity=".08"/>
        </linearGradient>
      </defs>

      <rect x="0" y="0" width="860" height="470" fill="url(#floor)"/>

      <!-- operating zone -->
      <g>
        <rect class="zoneFill" x="230" y="120" width="400" height="270" rx="14"/>
        <text x="430" y="150" text-anchor="middle" font-family="var(--mono)" font-size="12" letter-spacing="2"><tspan fill="var(--muted)">OPERATING ZONE - </tspan><tspan id="statusLabel" fill="var(--blue)">MONITORING</tspan></text>
      </g>

      <!-- robot + its own (inside-out) sensors -->
      <g class="robotG" transform="translate(0,0)">
        <g transform="translate(430,300)">
          <g class="robotSensors">
            <path class="arc" d="M0 0 L150 -48 A157 157 0 0 1 150 48 Z" fill="url(#coneGrad)" stroke="var(--blue)" stroke-width="1.4" stroke-opacity=".7"/>
            <path class="arc" d="M0 0 L150 -48 A157 157 0 0 1 150 48 Z" fill="url(#coneGrad)" stroke="var(--blue)" stroke-width="1.4" stroke-opacity=".7" transform="scale(-1,1)"/>
            <text x="0" y="112" text-anchor="middle" font-family="var(--mono)" font-size="10.5" letter-spacing="1" fill="var(--faint)">robot's own sensors (look forward/rear)</text>
          </g>
          <rect class="robotBody" x="-26" y="-26" width="52" height="52" rx="9" fill="#0f2740" stroke="var(--blue)" stroke-width="2"/>
          <circle cx="0" cy="0" r="5" fill="var(--blue)"/>
          <rect x="-14" y="-14" width="8" height="8" rx="2" fill="var(--faint)"/>
          <rect x="6" y="-14" width="8" height="8" rx="2" fill="var(--faint)"/>
        </g>
      </g>

      <!-- outside-in safety layer: perimeter nodes watching the zone edges -->
      <g class="extLayer">
        <g class="node"><circle cx="230" cy="255" r="7" fill="var(--orange)"/></g>
        <g class="node"><circle cx="630" cy="255" r="7" fill="var(--orange)"/></g>
        <g class="node"><circle cx="430" cy="120" r="7" fill="var(--orange)"/></g>
        <g class="node"><circle cx="430" cy="390" r="7" fill="var(--orange)"/></g>
        <text x="648" y="253" font-family="var(--mono)" font-size="10.5" letter-spacing="1" fill="var(--orange)"><tspan x="648" dy="0">watches the zone,</tspan><tspan x="648" dy="15">from the edges in</tspan></text>
      </g>

      <!-- breach marker where the person crosses the boundary -->
      <g class="breach">
        <line x1="340" y1="120" x2="340" y2="160" stroke="var(--orange)" stroke-width="2" stroke-dasharray="4 4"/>
        <circle cx="340" cy="120" r="14" fill="none" stroke="var(--orange)" stroke-width="2" opacity=".6"/>
      </g>

      <!-- person entering from outside the top edge -->
      <g class="person">
        <circle cx="0" cy="-8" r="8" fill="var(--white)"/>
        <rect x="-7" y="2" width="14" height="20" rx="6" fill="var(--white)"/>
      </g>

    </svg>
  </div>

  <div class="ctrls">
    <button class="btn" id="playBtn">Play</button>
    <button class="btn ghost" id="restartBtn">Restart</button>
    <button class="btn ghost" id="prevBtn">Prev</button>
    <button class="btn ghost" id="nextBtn">Next</button>
    <div class="dots" id="dots"></div>
  </div>

<script>
  const BEATS = [
    { status:["MONITORING","var(--blue)"] },
    { status:["MONITORING","var(--blue)"] },
    { status:["OUTSIDE-IN ACTIVE","var(--orange)"] },
    { status:["SAFE STOP","var(--orange)"] }
  ];

  const stage = document.getElementById("stage");
  const statusLabel = document.getElementById("statusLabel");
  const dotsWrap = document.getElementById("dots");
  const playBtn = document.getElementById("playBtn");

  let cur = 0, playing = false, timer = null;
  const DUR = [3200, 5200, 5200, 6000]; // ms per beat, retime to your VO

  BEATS.forEach((_,i)=>{
    const d = document.createElement("button");
    d.className = "dot" + (i===0?" on":"");
    d.onclick = ()=>{ stop(); show(i); };
    dotsWrap.appendChild(d);
  });
  const dots = [...dotsWrap.children];

  function show(i){
    cur = i;
    stage.dataset.beat = String(i+1);
    const b = BEATS[i];
    statusLabel.textContent = b.status[0];
    statusLabel.setAttribute("fill", b.status[1]);
    dots.forEach((d,j)=>d.classList.toggle("on", j===i));
  }

  function play(){
    playing = true; playBtn.textContent = "Pause";
    const step = ()=>{
      timer = setTimeout(()=>{
        if(cur < BEATS.length-1){ show(cur+1); step(); }
        else { stop(); }
      }, DUR[cur]);
    };
    step();
  }
  function stop(){
    playing = false; playBtn.textContent = "Play";
    if(timer){ clearTimeout(timer); timer=null; }
  }

  playBtn.onclick = ()=>{ if(playing) stop(); else { if(cur===BEATS.length-1) show(0); play(); } };
  document.getElementById("restartBtn").onclick = ()=>{ stop(); show(0); };
  document.getElementById("prevBtn").onclick = ()=>{ stop(); show(Math.max(0,cur-1)); };
  document.getElementById("nextBtn").onclick = ()=>{ stop(); show(Math.min(BEATS.length-1,cur+1)); };

  show(0);
</script>
</body>
</html>
